		body{

    /* From Uiverse.io by Yaya12085 */
    .card {
			position: absolute;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-radius: 0.75rem;
      background-color: white;
      width: 300px;
      height: 370px;
      box-shadow:
        0 4px 6px -1px rgba(0, 0, 0, 0.1),
        0 2px 4px -2px rgba(0, 0, 0, 0.1);
    }

    .header {
      position: relative;
      background-clip: border-box;
      margin-top: 1.5rem;
      margin-left: 1rem;
      margin-right: 1rem;
      border-radius: 0.75rem;
      background-color: rgb(33 150 243);
      box-shadow:
        0 10px 15px -3px rgba(33, 150, 243, 0.4),
        0 4px 6px -4px rgba(33, 150, 243, 0.4);
      height: 14rem;
    }

    .info {
      border: none;
      padding: 1.5rem;
      text-align: center;
    }

    .title {
      color: rgb(38 50 56);
      letter-spacing: 0;
      line-height: 1.375;
      font-weight: 600;
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .footer {
      padding: 0.75rem;
      border: 1px solid rgb(236 239 241);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: rgba(0, 140, 255, 0.082);
    }

    .tag {
      font-weight: 300;
      font-size: 0.75rem;
      display: block;
    }

    .action {
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
      border: none;
      outline: none;
      box-shadow:
        0 4px 6px -1px rgba(33, 150, 243, 0.4),
        0 2px 4px -2px rgba(33, 150, 243, 0.4);
      color: rgb(255 255 255);
      text-transform: uppercase;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 0.75rem 1.5rem;
      background-color: rgb(33 150 243);
      border-radius: 0.5rem;
    }
  </style>

  <body>
    <!-- From Uiverse.io by Yaya12085 -->
    <div class="card">
      <div class="header"></div>
      <div class="info">
        <p class="title">How to make this material card ?</p>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Maxime
          mollitia, molestiae quas vel sint commodi.
        </p>
      </div>
      <div class="footer">
        <p class="tag">#HTML #CSS</p>
        <button type="button" class="action">Get started</button>
      </div>
    </div>

  <script>
    const [ancestor] = document.getElementsByClassName("card");
		console.log(ancestor);
	
		ancestor.addEventListener('click',function(e){
				console.log("'click");
				console.log(e);
				
			if(e.target.matches('.header')){
				console.log('header is clicked');
				console.log(e.target);
			}
			if(e.target.matches('.action')){
				console.log("btn is clicked ");
				console.log(e.target);
				
			}
		})



		let drag=false;
		 let offsetX=0;
		 let offsetY=0;
		ancestor.addEventListener('mousedown',(e)=>{
			drag=true
			console.log('mouse down ');
			offsetX = e.clientX - ancestor.getBoundingClientRect().left;
        offsetY = e.clientY - ancestor.getBoundingClientRect().top;
			
		});
		document.addEventListener('mouseup',()=>{
			drag=false;

		});
		document.addEventListener('mousemove',(e)=>{
			console.log("mouse move ");
			
			if(drag){
				   ancestor.style.left = (e.clientX - offsetX) + 'px';
            ancestor.style.top = (e.clientY - offsetY) + 'px';
			}
		});
